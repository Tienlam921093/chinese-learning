# =====================================================
#  HANYU — Nginx Configuration
#  TOOL    : Nginx 1.25 (Alpine)
#  MỤC ĐÍCH: Serve static frontend, proxy API requests đến backend
# =====================================================

server {
    listen       80;
    server_name  localhost;
    root         /usr/share/nginx/html;
    index        index.html;
    charset      utf-8;

    # ── Gzip compression ──
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ── Security headers ──
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    # ── Cache static assets ──
    # JS/CSS không nên cache lâu vì file không có hash version.
    location ~* \.(css|js)$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location ~* \.(png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Proxy API to backend ──
    location /api/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Authorization $http_authorization;
        
        # CRITICAL: Explicitly forward Cookie header from browser to backend
        proxy_set_header Cookie $http_cookie;
        # CRITICAL: Forward Set-Cookie response headers back to browser
        proxy_pass_header Set-Cookie;
        
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }

    # ── SPA fallback: HTML5 history mode ──
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # ── Custom error pages ──
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html { root /usr/share/nginx/html; }
}
