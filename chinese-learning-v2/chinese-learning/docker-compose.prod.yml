# ══════════════════════════════════════════════════════════════
#  docker-compose.prod.yml — Production config
#  Usage: docker compose -f docker-compose.prod.yml up -d
#
#  FIX N30: Không mount source code vào container
#  FIX N33: Không expose port 1433 (SQL Server) ra ngoài
#  FIX N34: Không có adminer
# ══════════════════════════════════════════════════════════════

services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: hanyu-sqlserver
    restart: unless-stopped
    env_file:
      - ./secrets/sqlserver.env
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
      MSSQL_COLLATION: "Chinese_Simplified_Pinyin_100_CI_AS"
    # N33: KHÔNG expose port 1433 ra ngoài — chỉ internal network
    # ports:
    #   - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - hanyu-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q 'SELECT 1' -C || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hanyu-backend
    restart: unless-stopped
    env_file:
      - ./secrets/backend.env
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_SERVER: sqlserver
      DB_PORT: 1433
      DB_NAME: HanYuDB
    # N30: KHÔNG mount source code — dùng COPY từ Dockerfile (multi-stage build)
    # volumes:
    #   - ./backend:/app
    #   - /app/node_modules
    ports:
      - "5000:5000"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - hanyu-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    image: nginx:alpine
    container_name: hanyu-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Thêm SSL certs khi có:
      # - ./certs/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      # - ./certs/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
    depends_on:
      - backend
    networks:
      - hanyu-network

  # N34: KHÔNG có adminer trong production

volumes:
  sqlserver_data:
    name: hanyu_sqlserver_data

networks:
  hanyu-network:
    name: hanyu-network
    driver: bridge
