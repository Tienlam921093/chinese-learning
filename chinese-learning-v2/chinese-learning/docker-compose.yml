services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: hanyu-sqlserver
    restart: unless-stopped
    env_file:
      - ./secrets/sqlserver.env
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
      MSSQL_COLLATION: "Chinese_Simplified_Pinyin_100_CI_AS"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - hanyu-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q 'SELECT 1' -C || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: hanyu-db-init
    env_file:
      - ./secrets/sqlserver.env
      - ./secrets/backend.env
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./database/init.sql:/tmp/init.sql:ro
      - ./database/init-app.sh:/tmp/init-app.sh:ro
    networks:
      - hanyu-network
    restart: "no"
    command: ["bash", "/tmp/init-app.sh"]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hanyu-backend
    restart: unless-stopped
    env_file:
      - ./secrets/backend.env
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_SERVER: sqlserver
      DB_PORT: 1433
      DB_NAME: HanYuDB
      FRONTEND_URL: "http://localhost:8080"
    ports:
      - "5000:5000"
    depends_on:
      db-init:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - hanyu-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    image: nginx:alpine
    container_name: hanyu-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - hanyu-network

  adminer:
    image: adminer:latest
    container_name: hanyu-adminer
    restart: unless-stopped
    ports:
      - "8888:8080"
    environment:
      ADMINER_DEFAULT_SERVER: sqlserver
    networks:
      - hanyu-network
    profiles: ["dev"]

volumes:
  sqlserver_data:
    name: hanyu_sqlserver_data

networks:
  hanyu-network:
    name: hanyu-network
    driver: bridge
