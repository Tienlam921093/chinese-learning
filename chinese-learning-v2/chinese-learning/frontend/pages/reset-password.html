<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đặt Lại Mật Khẩu | HánYǔ</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/auth.css" />
  </head>
  <body>
    <div class="wrap">
      <a href="login.html" class="back-link">
        <i class="fa fa-arrow-left" style="font-size: 0.7rem"></i> Quay lại đăng
        nhập
      </a>
      <div class="card">
        <span class="logo">漢</span>
        <div class="card-title">Đặt Lại Mật Khẩu</div>
        <div class="card-sub">Tạo mật khẩu mới cho tài khoản của bạn</div>

        <div class="alert-box" id="alertBox"></div>

        <label class="field-label" for="newPassword">Mật khẩu mới</label>
        <div class="input-wrap">
          <span class="input-icon"><i class="fa fa-lock"></i></span>
          <input
            type="password"
            id="newPassword"
            placeholder="Tối thiểu 6 ký tự"
            autocomplete="new-password"
          />
        </div>

        <label class="field-label" for="confirmPassword"
          >Xác nhận mật khẩu</label
        >
        <div class="input-wrap">
          <span class="input-icon"><i class="fa fa-lock"></i></span>
          <input
            type="password"
            id="confirmPassword"
            placeholder="Nhập lại mật khẩu"
            autocomplete="new-password"
          />
        </div>

        <button class="btn-submit" id="resetBtn" onclick="handleReset()">
          <i class="fa fa-key"></i> Đặt Lại Mật Khẩu
        </button>
      </div>
    </div>

    <script src="../js/helpers.js"></script>
    <script src="../js/reset-password.js"></script>
  </body>
</html>
