<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng Nhập | HánYǔ</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- FIX N25: CSS tách ra file riêng -->
    <link rel="stylesheet" href="../css/auth.css" />
  </head>
  <body>
    <div class="wrap">
      <a href="../index.html" class="back-link">
        <i class="fa fa-arrow-left" style="font-size: 0.7rem"></i> Về trang chủ
      </a>
      <div class="card">
        <span class="logo">漢</span>
        <div class="card-title">Đăng Nhập</div>
        <div class="card-sub">Chào mừng trở lại! 欢迎回来！</div>

        <div class="alert-box" id="alertBox"></div>

        <!-- Social -->
        <div class="social-row">
          <button class="btn-social" onclick="socialLogin('google')">
            <svg width="18" height="18" viewBox="0 0 48 48">
              <path
                fill="#EA4335"
                d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"
              />
              <path
                fill="#4285F4"
                d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"
              />
              <path
                fill="#FBBC05"
                d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"
              />
              <path
                fill="#34A853"
                d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"
              />
            </svg>
            Google
          </button>
          <button class="btn-social" onclick="socialLogin('facebook')">
            <i
              class="fab fa-facebook"
              style="color: #1877f2; font-size: 1.1rem"
            ></i>
            Facebook
          </button>
        </div>
        <div class="divider">hoặc đăng nhập bằng email</div>

        <label class="field-label" for="email">Email</label>
        <div class="input-wrap">
          <span class="input-icon"><i class="fa fa-envelope"></i></span>
          <input
            type="email"
            id="email"
            placeholder="your@email.com"
            autocomplete="email"
          />
        </div>

        <label class="field-label" for="password">Mật khẩu</label>
        <div class="input-wrap">
          <span class="input-icon"><i class="fa fa-lock"></i></span>
          <input
            type="password"
            id="password"
            placeholder="••••••••"
            autocomplete="current-password"
          />
          <span class="toggle-pwd" onclick="togglePwd()"
            ><i class="fa fa-eye" id="eyeIcon"></i
          ></span>
        </div>

        <div class="row-mid">
          <label class="check-label">
            <input type="checkbox" id="remember" /> Ghi nhớ đăng nhập
          </label>
          <button class="forgot" onclick="openForgot()">Quên mật khẩu?</button>
        </div>

        <button class="btn-submit" id="loginBtn" onclick="handleLogin()">
          <i class="fa fa-sign-in-alt"></i> Đăng Nhập
        </button>

        <div class="footer-text">
          Chưa có tài khoản? <a href="register.html">Đăng ký miễn phí</a>
        </div>
      </div>
    </div>

    <!-- FORGOT PASSWORD MODAL -->
    <div class="overlay" id="forgotOverlay" onclick="closeForgotOutside(event)">
      <div class="modal-box">
        <div class="modal-title">🔑 Quên Mật Khẩu</div>
        <div class="modal-sub">
          Nhập email đăng ký của bạn. Chúng tôi sẽ gửi link đặt lại mật khẩu
          trong vài phút.
        </div>
        <input
          class="modal-input"
          type="email"
          id="forgotEmail"
          placeholder="your@email.com"
        />
        <div
          id="forgotMsg"
          style="font-size: 0.82rem; margin-bottom: 0.75rem; display: none"
        ></div>
        <div class="modal-footer">
          <button class="btn-cancel" onclick="closeForgot()">Đóng</button>
          <button class="btn-modal-send" onclick="sendReset()">
            <i class="fa fa-paper-plane me-1"></i> Gửi Email
          </button>
        </div>
      </div>
    </div>

    <!-- FIX N26: JS tách ra file riêng -->
    <script src="../js/deploy-config.js"></script>
    <script src="../js/login.js"></script>
  </body>
</html>
