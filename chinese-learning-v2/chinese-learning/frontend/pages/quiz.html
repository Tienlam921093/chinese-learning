<!doctype html>
<html lang="vi">
  <head>
    <!--
    NGÔN NGỮ : HTML5, JavaScript ES6+
    FRAMEWORK: Bootstrap 5.3
    THƯ VIỆN : Font Awesome, Web Speech API
    API      : GET /api/vocabulary, POST /api/progress/xp
    MỤC ĐÍCH : Trang kiểm tra trắc nghiệm từ vựng tiếng Trung
  -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kiểm Tra | HánYǔ</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Be+Vietnam+Pro:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
    <!-- FIX N25: CSS tách ra file riêng -->
    <link rel="stylesheet" href="../css/quiz.css" />
  </head>
  <body>
    <div class="app-layout">
      <div class="sidebar">
        <div class="d-flex align-items-center gap-2 mb-4 px-2">
          <span class="logo-char" style="font-size: 1.6rem">漢</span>
          <span
            style="
              font-family: var(--font-display);
              font-size: 1.1rem;
              color: #fff;
              font-weight: 700;
            "
            >HánYǔ</span
          >
        </div>
        <nav class="nav flex-column">
          <a class="nav-link" href="lessons.html"
            ><i class="fa fa-book-open"></i> Bài Học</a
          >
          <a class="nav-link" href="vocabulary.html"
            ><i class="fa fa-language"></i> Từ Vựng</a
          >
          <a class="nav-link active" href="quiz.html"
            ><i class="fa fa-question-circle"></i> Kiểm Tra</a
          >
          <a class="nav-link" href="chatbot.html"
            ><i class="fa fa-robot"></i> AI Tutor</a
          >
        </nav>
      </div>

      <div class="main-content d-flex flex-column align-items-center">
        <!-- START SCREEN -->
        <div
          id="startScreen"
          class="text-center"
          style="max-width: 500px; padding-top: 3rem"
        >
          <div style="font-size: 5rem">🎯</div>
          <h3 class="fw-bold mt-2" style="font-family: var(--font-display)">
            Kiểm Tra Từ Vựng
          </h3>
          <p class="text-muted">
            Chọn đáp án đúng cho mỗi chữ Hán. Có 15 câu hỏi, mỗi câu 20 giây.
          </p>
          <div class="card border-0 shadow-sm p-3 mb-4">
            <div class="row text-center g-3">
              <div class="col-4">
                <div class="fw-bold text-danger fs-4" id="totalQ">15</div>
                <small class="text-muted">Câu hỏi</small>
              </div>
              <div class="col-4">
                <div class="fw-bold text-primary fs-4">20s</div>
                <small class="text-muted">Mỗi câu</small>
              </div>
              <div class="col-4">
                <div class="fw-bold text-success fs-4">+10 XP</div>
                <small class="text-muted">Đúng/câu</small>
              </div>
            </div>
          </div>
          <div class="d-flex gap-2 mb-4 justify-content-center">
            <select class="form-select" id="quizHSK" style="max-width: 150px">
              <option value="1">HSK 1</option>
              <option value="2">HSK 2</option>
              <option value="all">Tất cả</option>
            </select>
            <select class="form-select" id="quizType" style="max-width: 200px">
              <option value="meaning">Chữ → Nghĩa</option>
              <option value="hanzi">Nghĩa → Chữ</option>
              <option value="pinyin">Chữ → Pinyin</option>
            </select>
          </div>
          <button class="btn btn-danger btn-lg px-5" onclick="startQuiz()">
            <i class="fa fa-play me-2"></i>Bắt Đầu Kiểm Tra
          </button>
        </div>

        <!-- QUIZ SCREEN -->
        <div
          id="quizScreen"
          class="w-100"
          style="max-width: 640px; display: none"
        >
          <!-- Header -->
          <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
              <small class="text-muted"
                >Câu <span id="qNum">1</span> /
                <span id="qTotal">15</span></small
              >
              <div class="progress mt-1" style="width: 200px; height: 6px">
                <div
                  class="progress-bar bg-danger"
                  id="quizProgress"
                  style="width: 0%"
                ></div>
              </div>
            </div>
            <div class="quiz-timer" id="timerDisplay">20</div>
            <div class="text-end">
              <span class="badge bg-success fs-6" id="scoreDisplay"
                >0 điểm</span
              >
              <div class="text-muted small">
                <span id="correctCount">0</span> đúng ·
                <span id="wrongCount">0</span> sai
              </div>
            </div>
          </div>

          <!-- Question card -->
          <div class="quiz-card mb-4">
            <div class="text-center mb-2">
              <span class="badge bg-secondary" id="qTypeLabel"
                >Chọn nghĩa đúng</span
              >
            </div>
            <div class="quiz-hanzi" id="qQuestion">你好</div>
            <div class="row g-2 mt-2" id="optionsGrid"></div>
          </div>

          <div class="text-center">
            <button
              class="btn btn-outline-secondary btn-sm"
              onclick="skipQuestion()"
            >
              <i class="fa fa-forward me-1"></i>Bỏ qua
            </button>
          </div>
        </div>

        <!-- RESULT SCREEN -->
        <div
          id="resultScreen"
          class="text-center"
          style="max-width: 500px; display: none"
        >
          <div style="font-size: 5rem" id="resultEmoji">🏆</div>
          <h3
            class="fw-bold mt-2"
            style="font-family: var(--font-display)"
            id="resultTitle"
          >
            Xuất Sắc!
          </h3>
          <p class="text-muted" id="resultSubtitle"></p>

          <div class="card border-0 shadow-sm p-4 mb-4">
            <div class="row text-center g-3 mb-3">
              <div class="col-4">
                <div class="fw-bold fs-3 text-success" id="rCorrect">0</div>
                <small>Đúng</small>
              </div>
              <div class="col-4">
                <div class="fw-bold fs-3 text-danger" id="rWrong">0</div>
                <small>Sai</small>
              </div>
              <div class="col-4">
                <div class="fw-bold fs-3 text-warning" id="rXP">0</div>
                <small>XP nhận</small>
              </div>
            </div>
            <div class="text-muted small mb-2">Tỉ lệ đúng</div>
            <div
              style="
                background: #f0f0f0;
                border-radius: 8px;
                overflow: hidden;
                height: 16px;
              "
            >
              <div
                class="result-bar bg-success"
                id="resultBar"
                style="width: 0%"
              ></div>
            </div>
            <div class="fw-bold mt-1" id="resultPct">0%</div>
          </div>

          <div class="d-flex gap-2 justify-content-center">
            <button class="btn btn-outline-secondary" onclick="showStart()">
              <i class="fa fa-home me-1"></i>Về Trang Chủ
            </button>
            <button class="btn btn-danger" onclick="startQuiz()">
              <i class="fa fa-redo me-1"></i>Làm Lại
            </button>
            <a href="chatbot.html" class="btn btn-primary">
              <i class="fa fa-robot me-1"></i>Hỏi AI Tutor
            </a>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    <!-- FIX N26: JS tách ra file riêng -->
    <script src="../js/deploy-config.js"></script>
    <script src="../js/helpers.js"></script>
    <script src="../js/quiz.js"></script>
  </body>
</html>
