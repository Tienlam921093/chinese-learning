<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Học Bài | HánYǔ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Be+Vietnam+Pro:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <!-- FIX N25: CSS tách ra file riêng -->
  <link rel="stylesheet" href="../css/study.css"/>
</head>
<body>
<div class="study-shell">
  <aside class="sidebar">
    <a href="../index.html" class="brand"><span class="brand-char">漢</span><span>HánYǔ</span></a>
    <a class="side-link active" href="lessons.html"><i class="fa fa-book-open"></i>Bài Học</a>
    <a class="side-link" href="vocabulary.html"><i class="fa fa-language"></i>Từ Vựng</a>
    <a class="side-link" href="quiz.html"><i class="fa fa-question-circle"></i>Kiểm Tra</a>
    <a class="side-link" href="chatbot.html"><i class="fa fa-robot"></i>AI Tutor</a>
    <a class="side-link" href="live-classes.html"><i class="fa fa-video"></i>Lop Live</a>
  </aside>

  <main class="study-main">
    <div class="study-header">
      <div>
        <div class="hsk-pill" id="lessonBadge">HSK 1</div>
        <h1 class="lesson-title mt-2" id="lessonTitle">Đang tải bài học...</h1>
        <div class="lesson-sub" id="lessonIntro"></div>
      </div>
      <div class="action-row">
        <a class="btn btn-outline-secondary" href="lessons.html"><i class="fa fa-arrow-left me-1"></i>Bài học</a>
        <a class="btn btn-outline-primary" id="vocabLink" href="vocabulary.html"><i class="fa fa-list me-1"></i>Xem từ</a>
        <a class="btn btn-danger" id="flashcardLink" href="vocabulary.html"><i class="fa fa-layer-group me-1"></i>Flashcard</a>
      </div>
    </div>

    <div class="study-grid">
      <section>
        <div class="panel mb-3">
          <h5><i class="fa fa-pen-nib text-danger me-2"></i>Ngữ pháp trọng tâm</h5>
          <div id="grammarList"></div>
        </div>
        <div class="panel mb-3">
          <h5><i class="fa fa-comments text-primary me-2"></i>Ví dụ mẫu</h5>
          <div id="exampleList"></div>
        </div>
        <div class="panel">
          <h5><i class="fa fa-headphones text-success me-2"></i>Luyện nghe</h5>
          <div id="listeningList"></div>
        </div>
      </section>

      <aside>
        <div class="panel mb-3">
          <h5><i class="fa fa-key text-warning me-2"></i>Từ khóa bài học</h5>
          <div id="keywordList"></div>
        </div>
        <div class="complete-box">
          <h5 class="mb-2">Hoàn thành bài học</h5>
          <p class="mb-3">Đọc ngữ pháp, nghe ví dụ, rồi chuyển sang flashcard để luyện nhớ từ.</p>
          <button class="btn btn-success w-100" onclick="markStudied()"><i class="fa fa-check me-1"></i>Đánh dấu đã học</button>
        </div>
      </aside>
    </div>
  </main>
</div>

<!-- FIX N26: JS tách ra file riêng -->
<script src="../js/deploy-config.js"></script>
<script src="../js/helpers.js"></script>
<script src="../js/study.js"></script>
</body>
</html>
