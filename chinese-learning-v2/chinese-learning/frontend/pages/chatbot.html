<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Tutor 小明 | HánYǔ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <!-- FIX N25: CSS tach ra file rieng -->
  <link rel="stylesheet" href="../css/app.css"/>
  <link rel="stylesheet" href="../css/chatbot.css"/>
</head>
</head>
<body>

<div class="chat-app">

  <!-- ████ SIDEBAR ████ -->
  <div class="sidebar">
    <div class="sidebar-header">
      <a href="../index.html" class="sb-logo">
        <span class="sb-logo-char">漢</span>
        <div>
          <div class="sb-logo-text">HánYǔ</div>
          <div class="sb-logo-sub">AI Tutor Tiếng Trung</div>
        </div>
      </a>

      <div class="xp-row">
        <span class="xp-pill xp" id="xpDisplay">⚡ 0 XP</span>
        <span class="xp-pill str" id="streakDisplay">🔥 0 ngày</span>
      </div>

      <div class="sb-section-label" style="margin-top:0">Chế độ học</div>
      <div class="mode-row">
        <button class="mode-btn active" id="modeFree"   onclick="setMode('free')">💬 Tự do</button>
        <button class="mode-btn"        id="modeLesson" onclick="setMode('lesson')">📚 Bài</button>
        <button class="mode-btn"        id="modeQuiz"   onclick="setMode('quiz')">🎯 Quiz</button>
      </div>
    </div>

    <div class="sidebar-body">
      <div class="sb-section-label">Gợi ý câu hỏi</div>

      <button class="suggest-btn" onclick="quickSend('Dạy tôi cách tự giới thiệu bằng tiếng Trung')">
        <span class="sicon">🧑</span> Tự giới thiệu bản thân
      </button>
      <button class="suggest-btn" onclick="quickSend('Giải thích 4 thanh điệu trong tiếng Trung')">
        <span class="sicon">🎵</span> Giải thích thanh điệu
      </button>
      <button class="suggest-btn" onclick="quickSend('Dạy tôi 8 từ về màu sắc bằng tiếng Trung')">
        <span class="sicon">🎨</span> Từ vựng màu sắc
      </button>
      <button class="suggest-btn" onclick="quickSend('Cách đặt câu hỏi trong tiếng Trung như thế nào?')">
        <span class="sicon">❓</span> Đặt câu hỏi
      </button>
      <button class="suggest-btn" onclick="quickSend('Luyện hội thoại đặt đồ ăn tại nhà hàng tiếng Trung')">
        <span class="sicon">🍜</span> Hội thoại nhà hàng
      </button>
      <button class="suggest-btn" onclick="quickSend('Sửa lỗi câu này giúp tôi: 我是越南人来自河内')">
        <span class="sicon">✏️</span> Sửa lỗi ngữ pháp
      </button>
      <button class="suggest-btn" onclick="quickSend('Dạy tôi ngữ pháp cơ bản: cấu trúc câu tiếng Trung')">
        <span class="sicon">📖</span> Ngữ pháp cơ bản
      </button>
      <button class="suggest-btn" onclick="quickSend('Cho tôi 5 từ HSK 1 mới kèm ví dụ câu')">
        <span class="sicon">🃏</span> Từ mới HSK 1
      </button>
    </div>

    <div class="sidebar-footer">
      <button class="sb-btn outline" onclick="clearChat()">
        <i class="fa fa-plus" style="font-size:.75rem"></i> Cuộc trò chuyện mới
      </button>
      <a href="lessons.html" class="sb-btn ghost">
        <i class="fa fa-book-open" style="font-size:.72rem"></i> Bài học
      </a>
      <a href="../index.html" class="sb-btn ghost">
        <i class="fa fa-home" style="font-size:.72rem"></i> Trang chủ
      </a>
    </div>
  </div>

  <!-- ████ MAIN ████ -->
  <div class="chat-main">

    <!-- Header -->
    <div class="chat-head">
      <div class="chat-head-avatar"><i class="fa fa-robot"></i></div>
      <div>
        <div class="chat-head-name">小明 — AI Tutor Tiếng Trung</div>
        <div class="chat-head-status">
          <span class="status-dot"></span> Trực tuyến · Trả lời ngay lập tức
        </div>
      </div>
      <div class="chat-head-actions">
        <button class="head-btn" id="voiceBtn" onclick="toggleVoice()" title="Đọc to (TTS)">
          <i class="fa fa-volume-up"></i>
        </button>
        <button class="head-btn" onclick="clearChat()" title="Xóa chat">
          <i class="fa fa-trash-alt"></i>
        </button>
        <a href="lessons.html" class="head-btn" title="Bài học" style="text-decoration:none">
          <i class="fa fa-book-open"></i>
        </a>
      </div>
    </div>

    <!-- Quick chips -->
    <div class="chat-chips">
      <button class="chip" onclick="quickSend('你好！教我如何问候')">👋 Chào hỏi</button>
      <button class="chip" onclick="quickSend('Dạy tôi đếm số 1-10 tiếng Trung')">🔢 Số đếm</button>
      <button class="chip" onclick="quickSend('Ngữ pháp: câu phủ định trong tiếng Trung')">📖 Ngữ pháp</button>
      <button class="chip" onclick="quickSend('Cho tôi 5 từ mới ngẫu nhiên HSK 1 kèm ví dụ')">🃏 Từ mới</button>
      <button class="chip" onclick="quickSend('Ra cho tôi 1 câu hỏi trắc nghiệm tiếng Trung')">✅ Quiz</button>
      <button class="chip" onclick="quickSend('Giải thích sự khác biệt 的 了 过 trong tiếng Trung')">🔍 Ngữ pháp nâng cao</button>
    </div>

    <!-- Messages -->
    <div class="chat-messages" id="chatMessages">
      <!-- Welcome message (rendered via JS) -->
    </div>

    <!-- Input -->
    <div class="chat-input-wrap">
      <div class="input-row">
        <textarea
          class="chat-textarea" id="chatInput"
          placeholder="Nhập câu hỏi tiếng Việt hoặc tiếng Trung... (Enter để gửi)"
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoGrow(this)"
        ></textarea>
        <div class="input-actions">
          <button class="icon-btn mic" id="micBtn" onclick="toggleMic()" title="Ghi âm (Chrome)">
            <i class="fa fa-microphone"></i>
          </button>
          <button class="icon-btn send" id="sendBtn" onclick="sendMessage()" title="Gửi (Enter)">
            <i class="fa fa-paper-plane"></i>
          </button>
        </div>
      </div>

    </div>

  </div><!-- /chat-main -->
</div><!-- /chat-app -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
<!-- FIX N26: JS tach ra file rieng -->
<script src="../js/helpers.js"></script>
<script src="../js/chatbot.js"></script>
</body>
</html>
