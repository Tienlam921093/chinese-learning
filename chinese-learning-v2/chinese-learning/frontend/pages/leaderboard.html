<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bảng Xếp Hạng | HánYǔ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <!-- FIX N25: CSS tách ra file riêng -->
  <link rel="stylesheet" href="../css/app.css"/>
  <link rel="stylesheet" href="../css/leaderboard.css"/>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-top">
      <a href="../index.html" class="sb-logo">
        <span class="sb-logo-c">漢</span>
        <span class="sb-logo-t">HánYǔ</span>
      </a>
      <div class="user-card">
        <div style="display:flex;align-items:center;gap:.6rem;margin-bottom:.5rem">
          <div class="user-ava" id="uAva">?</div>
          <div>
            <div class="user-name" id="uName">…</div>
            <div class="user-sub">HSK <span id="uHSK">1</span> · <span id="uXP">0</span> XP</div>
          </div>
        </div>
        <div class="xp-bar"><div class="xp-bar-fill" id="uXPBar" style="width:0%"></div></div>
        <div style="margin-top:.4rem">
          <small style="color:rgba(255,255,255,.4);font-size:.7rem">Streak: <span id="uStreak" style="color:var(--gold)">🔥 0</span></small>
        </div>
      </div>
    </div>
    <div class="sb-nav">
      <a class="sb-link" href="lessons.html"><i class="fa fa-book-open"></i> Bài Học</a>
      <a class="sb-link" href="vocabulary.html"><i class="fa fa-language"></i> Từ Vựng</a>
      <a class="sb-link" href="quiz.html"><i class="fa fa-question-circle"></i> Kiểm Tra</a>
      <a class="sb-link" href="chatbot.html"><i class="fa fa-robot"></i> AI Tutor</a>
      <a class="sb-link" href="live-classes.html"><i class="fa fa-video"></i> Lop Live</a>
      <hr class="sb-divider"/>
      <a class="sb-link active" href="leaderboard.html"><i class="fa fa-trophy"></i> Bảng Xếp Hạng</a>
      <a class="sb-link" href="profile.html"><i class="fa fa-user"></i> Hồ Sơ</a>
      <hr class="sb-divider"/>
      <a class="sb-link" href="#" onclick="logout()"><i class="fa fa-sign-out-alt"></i> Đăng Xuất</a>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div>
        <div class="page-title">🏆 Bảng Xếp Hạng</div>
        <div class="page-date" id="todayDate"></div>
      </div>
      <div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap">
        <span class="badge-pill badge-streak">🔥 <span id="topStreak">0</span> ngày</span>
        <span class="badge-pill badge-xp">⚡ <span id="topXP">0</span> XP</span>
      </div>
    </div>

    <!-- Tabs -->
    <div class="filter-tabs">
      <button class="ftab tab-all active" id="tabAll" onclick="switchTab('all')">🌏 Tất Cả</button>
      <button class="ftab tab-week" id="tabWeek" onclick="switchTab('week')">📅 Tuần Này</button>
    </div>

    <!-- My rank -->
    <div class="my-rank-banner" id="myBanner" style="display:none">
      <div class="my-rank-num" id="myRankNum">#–</div>
      <div>
        <div class="my-rank-label">Thứ hạng của bạn</div>
        <div class="my-rank-name" id="myRankName">–</div>
        <div class="my-rank-xp" id="myRankXP">0 XP</div>
      </div>
      <div class="my-rank-hsk">
        <div class="val" id="myRankHSK">–</div>
        <span class="lbl">HSK Level</span>
      </div>
    </div>

    <!-- Podium -->
    <div class="podium-row" id="podium"></div>

    <!-- List -->
    <div class="lb-card" id="lbList">
      <div style="padding:1rem;display:flex;flex-direction:column;gap:.75rem">
        <div class="sk" style="height:46px"></div>
        <div class="sk" style="height:46px"></div>
        <div class="sk" style="height:46px"></div>
        <div class="sk" style="height:46px"></div>
        <div class="sk" style="height:46px"></div>
      </div>
    </div>
  </div>
</div>

<!-- FIX N26: JS tách ra file riêng -->
<script src="../js/deploy-config.js"></script>
<script src="../js/helpers.js"></script>
<script src="../js/leaderboard.js"></script>
</body>
</html>
