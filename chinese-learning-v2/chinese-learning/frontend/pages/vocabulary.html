<!DOCTYPE html>
<html lang="vi">
<head>
  <!--
    NGÔN NGỮ : HTML5, JavaScript ES6+
    FRAMEWORK: Bootstrap 5.3
    THƯ VIỆN : Font Awesome 6, Web Speech API (phát âm)
    API      : GET /api/vocabulary/flashcard (Spaced Repetition)
    MỤC ĐÍCH : Trang luyện flashcard từ vựng + flip card animation
  -->
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Từ Vựng | HánYǔ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Be+Vietnam+Pro:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <!-- FIX N25: CSS tach ra file rieng -->
  <link rel="stylesheet" href="../css/vocabulary.css"/>
</head>
</head>
<body>
<div class="app-layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="d-flex align-items-center gap-2 mb-4 px-2">
      <span class="logo-char" style="font-size:1.6rem">漢</span>
      <span style="font-family:var(--font-display);font-size:1.1rem;color:#fff;font-weight:700">HánYǔ</span>
    </div>
    <nav class="nav flex-column">
      <a class="nav-link" href="lessons.html"><i class="fa fa-book-open"></i> Bài Học</a>
      <a class="nav-link active" href="vocabulary.html"><i class="fa fa-language"></i> Từ Vựng</a>
      <a class="nav-link" href="quiz.html"><i class="fa fa-question-circle"></i> Kiểm Tra</a>
      <a class="nav-link" href="chatbot.html"><i class="fa fa-robot"></i> AI Tutor</a>
      <hr style="border-color:rgba(255,255,255,0.1)"/>
      <a class="nav-link" href="lessons.html" onclick="logout()"><i class="fa fa-sign-out-alt"></i> Đăng Xuất</a>
    </nav>
  </div>

  <!-- MAIN -->
  <div class="main-content">
    <div class="d-flex align-items-center justify-content-between mb-4">
      <div>
        <h4 class="fw-bold mb-0" style="font-family:var(--font-display)" id="pageHeading">🃏 Học Flashcard</h4>
        <small class="text-muted" id="pageSubtext">Nhấn vào thẻ để xem nghĩa · Đánh giá mức độ nhớ</small>
        <div class="mt-2"><span class="study-mode-pill" id="cardSourceText">Đang tải bộ từ...</span></div>
      </div>
      <div class="d-flex gap-2">
        <select class="form-select form-select-sm" id="hskFilter" onchange="loadCards()" style="min-width:180px">
          <optgroup label="HSK 1">
            <option value="lesson_1">Bài 1 · Chào Hỏi Cơ Bản</option>
            <option value="lesson_2">Bài 2 · Số Đếm 1-10</option>
            <option value="lesson_3">Bài 3 · Màu Sắc</option>
            <option value="lesson_4">Bài 4 · Gia Đình</option>
            <option value="lesson_5">Bài 5 · Thức Ăn &amp; Đồ Uống</option>
            <option value="lesson_6">Bài 6 · Thời Gian</option>
            <option value="hsk_1">── Toàn bộ HSK 1 (72 từ)</option>
          </optgroup>
          <optgroup label="HSK 2">
            <option value="lesson_7">Bài 7 · Mua Sắm</option>
            <option value="lesson_8">Bài 8 · Giao Thông</option>
            <option value="hsk_2">── Toàn bộ HSK 2 (53 từ)</option>
          </optgroup>
          <optgroup label="HSK 3">
            <option value="hsk_3">── Toàn bộ HSK 3 (47 từ)</option>
          </optgroup>
          <optgroup label="HSK 4-6">
            <option value="lesson_12">Bài 12 · Công Việc</option>
            <option value="lesson_13">Bài 13 · Cảm Xúc &amp; Tính Cách</option>
            <option value="hsk_4">── Toàn bộ HSK 4 (58 từ)</option>
            <option value="lesson_14">Bài 14 · Kinh Tế &amp; Tài Chính</option>
            <option value="lesson_15">Bài 15 · Môi Trường</option>
            <option value="hsk_5">── Toàn bộ HSK 5 (78 từ)</option>
            <option value="lesson_16">Bài 16 · Triết Học &amp; Văn Hóa</option>
            <option value="lesson_17">Bài 17 · Chính Trị &amp; Xã Hội</option>
            <option value="hsk_6">── Toàn bộ HSK 6 (115 từ)</option>
          </optgroup>
        </select>
        <button class="btn btn-outline-secondary btn-sm" onclick="shuffleCards()">
          <i class="fa fa-shuffle me-1"></i>Xáo trộn
        </button>
      </div>
    </div>

    <!-- Progress bar -->
    <div class="mb-4">
      <div class="d-flex justify-content-between align-items-center mb-1">
        <small class="text-muted">Tiến độ: <span id="progressText">0 / 0</span></small>
        <small class="text-success fw-semibold" id="sessionScore">✅ 0 đúng</small>
      </div>
      <div class="progress" style="height:8px">
        <div class="progress-bar bg-success" id="progressBar" style="width:0%"></div>
      </div>
    </div>

    <!-- Flashcard -->
    <div class="text-center mb-4">
      <div class="flashcard-scene" onclick="flipCard()" id="cardScene">
        <div class="flashcard" id="flashcard">
          <!-- Front: Chữ Hán -->
          <div class="card-front">
            <div class="big-hanzi" id="cardHanzi">你好</div>
            <div class="pinyin-text" id="cardPinyin">nǐ hǎo</div>
            <div class="tone-bar" id="tonebar"></div>
            <small style="opacity:0.5;margin-top:1rem">👆 Nhấn để xem nghĩa</small>
          </div>
          <!-- Back: Nghĩa + Ví dụ -->
          <div class="card-back">
            <div class="meaning-text" id="cardMeaning">Xin chào</div>
            <div class="example-text" id="cardExample"></div>
            <button class="btn btn-outline-secondary btn-sm mt-3" onclick="speakCurrent(event)">
              <i class="fa fa-volume-up me-1"></i>Phát âm
            </button>
          </div>
        </div>
      </div>
      <small class="text-muted d-block mt-2" id="cardCounter">Thẻ 1 / 10</small>
    </div>

    <!-- Rating buttons (hiện sau khi lật) -->
    <div class="d-flex justify-content-center gap-2 flex-wrap mb-4" id="ratingArea" style="display:none">
      <button class="rating-btn btn btn-danger"    onclick="rateCard(1)">😰 Khó<br><small>1 ngày</small></button>
      <button class="rating-btn btn btn-warning"   onclick="rateCard(3)">🤔 Tạm được<br><small>3 ngày</small></button>
      <button class="rating-btn btn btn-success"   onclick="rateCard(5)">😄 Dễ<br><small>7 ngày</small></button>
    </div>

    <!-- Navigation -->
    <div class="d-flex justify-content-center gap-3">
      <button class="btn btn-outline-secondary" onclick="prevCard()"><i class="fa fa-arrow-left me-1"></i>Trước</button>
      <button class="btn btn-danger" onclick="nextCard()">Tiếp theo <i class="fa fa-arrow-right ms-1"></i></button>
    </div>

    <!-- Vocabulary list below -->
    <hr class="my-4"/>
    <h5 class="fw-bold mb-3" style="font-family:var(--font-display)">📋 Danh Sách Từ Vựng</h5>
    <div class="row g-2" id="vocabList"></div>
  </div>
</div>

<!-- Summary Modal Overlay — nằm ngoài layout để không ảnh hưởng nút Trước/Tiếp theo -->
<div id="summaryOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:9999; align-items:center; justify-content:center;">
  <div style="background:linear-gradient(135deg,#1a1a2e,#0f3460); border-radius:24px; padding:3rem 2.5rem; text-align:center; color:#fff; width:min(500px,92vw); box-shadow:0 20px 60px rgba(0,0,0,0.6);">
    <div id="summaryEmoji" style="font-size:3.5rem">🎉</div>
    <h3 class="mt-3 fw-bold">Hoàn thành!</h3>
    <p id="summaryText" style="opacity:0.85; font-size:1.05rem; margin-bottom:1.75rem"></p>
    <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
      <button class="btn btn-outline-light px-4" onclick="closeSummaryAndReload()">🔁 Học lại</button>
      <button class="btn btn-danger px-4" id="summaryNextBtn" onclick="goNextHsk()" style="display:none">Bộ tiếp theo →</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- FIX N26: JS tach ra file rieng -->
<script src="../js/helpers.js"></script>
<script src="../js/vocabulary.js"></script>
</body>
</html>
